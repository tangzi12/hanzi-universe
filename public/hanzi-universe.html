<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>汉书998 - 汉字宇宙手游MVP</title>
  <style>
    :root {
      --stage-w: min(100vw, 450px);
      --stage-h: min(100vh, calc(var(--stage-w) * 16 / 9));
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --glass: rgba(6, 8, 24, 0.72);
      --line: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #02030b;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      touch-action: none;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 18%, rgba(91, 70, 255, 0.38), transparent 33%),
        radial-gradient(circle at 15% 82%, rgba(0, 220, 255, 0.14), transparent 24%),
        #01020a;
    }

    .stage {
      position: relative;
      width: var(--stage-w);
      height: var(--stage-h);
      max-height: 100vh;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      background: #02020b;
      box-shadow: 0 0 70px rgba(71, 115, 255, 0.24);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .topbar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 5;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .topbar.active {
      display: flex;
    }

    .icon-btn,
    .mode-btn {
      border: 1px solid var(--line);
      background: var(--glass);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(14px);
      pointer-events: auto;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 20px;
      line-height: 1;
    }

    .top-title {
      min-width: 0;
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(4, 6, 20, 0.52);
      backdrop-filter: blur(12px);
      font-weight: 800;
      letter-spacing: 0;
      text-align: center;
      text-shadow: 0 0 18px rgba(120, 186, 255, 0.6);
    }

    .home-panel {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 26px 18px 20px;
      pointer-events: none;
    }

    .home-panel.hidden {
      display: none;
    }

    .brand {
      position: absolute;
      top: 38px;
      left: 24px;
      right: 24px;
      pointer-events: none;
    }

    .brand .eyebrow {
      margin-bottom: 8px;
      color: rgba(135, 225, 255, 0.9);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.22em;
    }

    .brand h1 {
      font-family: "KaiTi", "STKaiti", serif;
      font-size: clamp(46px, 13vw, 64px);
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow:
        0 0 18px rgba(156, 210, 255, 0.8),
        0 6px 28px rgba(0, 0, 0, 0.78);
    }

    .brand p {
      width: min(330px, 100%);
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.76);
      font-size: 13px;
      line-height: 1.65;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      pointer-events: auto;
    }

    .mode-btn {
      min-height: 72px;
      border-radius: 8px;
      padding: 12px;
      text-align: left;
    }

    .mode-btn strong {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }

    .mode-btn span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .status {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 5;
      display: none;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      pointer-events: none;
    }

    .status.active {
      display: grid;
    }

    .status-card {
      min-height: 62px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.33);
      overflow: hidden;
    }

    .status-card small {
      display: block;
      color: rgba(139, 226, 255, 0.82);
      font-size: 11px;
      font-weight: 700;
    }

    .status-card strong {
      display: block;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 17px;
      line-height: 1.25;
    }

    .count-pill {
      width: 64px;
      height: 64px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.92), transparent 18%),
        linear-gradient(135deg, rgba(255, 95, 175, 0.96), rgba(28, 185, 255, 0.96));
      display: grid;
      place-items: center;
      box-shadow: 0 0 34px rgba(28, 185, 255, 0.38);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      flex-direction: column;
      background: #000;
    }

    .video-overlay.active {
      display: flex;
    }

    .video-head {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .video-title {
      min-width: 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.58);
      font-weight: 800;
      pointer-events: none;
    }

    .video-close,
    .video-next {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.58);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      pointer-events: auto;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 94px;
      z-index: 10;
      max-width: calc(100% - 36px);
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      color: #101322;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
      opacity: 0;
      transform: translate(-50%, 12px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (min-aspect-ratio: 9 / 16) {
      :root {
        --stage-h: 100vh;
        --stage-w: min(450px, calc(100vh * 9 / 16));
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <canvas id="game"></canvas>

    <section class="home-panel" id="homePanel">
      <div class="brand">
        <div class="eyebrow">HANSHU 998</div>
        <h1>汉书998</h1>
        <p>全球首个包含汉字宇宙、字碰碰、指彩笔、爱碰碰的汉字学习与汉字游戏平台。</p>
      </div>
      <div class="mode-grid">
        <button class="mode-btn" data-mode="universe">
          <strong>汉字宇宙</strong>
          <span>998个汉字星球，点击播放汉字视频</span>
        </button>
        <button class="mode-btn" data-mode="word">
          <strong>字碰碰</strong>
          <span>像台球一样碰撞，组成2到5字词</span>
        </button>
        <button class="mode-btn" data-mode="brush">
          <strong>指彩笔</strong>
          <span>彩笔引导手指，跟着笔锋写汉字</span>
        </button>
        <button class="mode-btn" data-mode="love">
          <strong>爱碰碰</strong>
          <span>玩家星球相遇，生成新的缘分星球</span>
        </button>
      </div>
    </section>

    <header class="topbar" id="topbar">
      <button class="icon-btn" id="backBtn" aria-label="返回首页">‹</button>
      <div class="top-title" id="topTitle">汉字宇宙</div>
      <button class="icon-btn" id="shuffleBtn" aria-label="重置">↻</button>
    </header>

    <section class="status" id="status">
      <div class="status-card">
        <small id="statusLabel">当前入口</small>
        <strong id="statusText">点击任意汉字星球</strong>
      </div>
      <div class="count-pill" id="countPill">998<br>字星</div>
    </section>

    <div class="toast" id="toast">已选择汉字星球</div>

    <section class="video-overlay" id="videoOverlay">
      <div class="video-head">
        <button class="video-close" id="videoClose" aria-label="关闭视频">×</button>
        <div class="video-title" id="videoTitle">汉字视频</div>
        <button class="video-next" id="videoNext" aria-label="下一个视频">›</button>
      </div>
      <video id="player" controls playsinline></video>
    </section>
  </main>

  <script>
    const HANZI_SOURCE = `
人脑身体心声相貌精气神形意识灵魂仁义礼智信勇聪德福厉害头发眼脸哭笑欢喜怒哀乐耳鼻口牙舌胆手指腿脚衣食住裙裤鞋袜生活健康你他我她自己仆它公亲祖宗父母爸妈兄弟姐妹叔伯姑姨夫妻爷奶孩儿孙子姓名性别男女老幼童官兵侠盗警匪皇帝王霸圣君帅将军师旅团营连排班士民们真假美丑穷富漂亮好坏善恶肥胖瘦恋爱恨情仇笨病痛死亡讨厌烦恼慌抑郁闲忙恐怕独吞吐佛道儒仙鬼巫魔怪学习思想教授课堂创忆编译培训记录设计算竞赛考试研究理论调对错听闻说讲写画读看望叫歌唱加减乘除百千万亿数术几何正负经济语哲音育艺历史本硕博方格圆点线面角斜直弯扁周个次层位级条尺寸斤码粒全都半尽满欠双单字图题目笔墨纸张陶瓷丝华央琴棋书画诗词句文武疫苗力能量事芯磁程序任志印从矛盾物质时空宇宙天地星辰古今明未分秒年季月日晨昏早午夜晚春夏秋冬色彩赤橙黄绿青蓝紫黑红白灰光黑暗寒冷冰冻温暖热东南西北前后左右上下顶底中核里内外旁边山野丘陵洞塘溪河川江湖海洋波浪云霞烟雾风雨雪雷电横竖深浅远近平曲轻重多少率巨大微小高矮低长短宽窄厚薄新旧香臭金木水火土有无阴太阳干湿软硬缓急快慢强弱虚实速度修改变化城市交通铁路汽车飞机轮船招牌广告展示影视讯息网络互联旅游便宜贵京津深圳广州汉唐湘苏杭岛湾买卖钞票支付款安全服务销售品类银行费求付协议合同价钱选择租借预订谈判签字盖章街巷楼厦厅霓虹店场站所园港院亭台阁廊梯厢玻璃共卫厕系统总工商医药全球世界洲国欧亚澳英俄韩伊朗朝鲜省区县政府党委部司局处科股主副各治管乱存废失企业宾馆矿厂法律证据包装权职称号清洁净脏社群战争成功炮弹爆炸钢铁乡村镇庄农田沙石家庭墙房屋门窗桌椅凳床被桶灯井棚刀枪弓箭锅盆碗筷杯勺瓶板炒煮熟烧杀洗刷养喂咬担挖砍割种采摘挑倒桃李桂花草树林叶根皮毛麦稻玉米菜瓜果辣椒葡萄萝卜豆薯柴油盐酱醋味咸淡酸甜苦饭汤粥烟酒茶骨血肉蛋爪猪鱼狗猫鸡鸭羊窝虎狮龙鸟蛇牛马狼猴蜂动出入进退呼吸问答起立坐躺睡摸爬滚打抓抱踢踩奔跑走跳踏举推牵吃喝拉撒索拿卡要来去还原迎送回聚散奖罚接收给受攻守防沉浮升降取舍柔和刚猛饥饿醉饱关闭开放保护消灭比划跟随超越换队并列存在隔离扔掉等待留藏纪念闹腾降落革命得到抵达突围转移私密知遇丢使用胜利败更冲撞停刺击射挡碰捉抛捧拆挥洒搞玩埋演戏提替找访翻舞做作克惯刻登梦醒弄闷堵抢寻传递滴流汇集幸运巧贴静潮荒益报兴恒参啊哈呵呀这那此哪限什么样了的于是不可以否非常即之乎者也与够很但而况且极需必然又莫因为定当暂由请感谢
`;

    const VIDEO_MAP = {
      "云": ["/videos/yun-1.mp4", "/videos/yun-2.mp4"],
      "雨": ["/videos/yu-1.mp4", "/videos/yu-2.mp4", "/videos/yu-3.mp4"],
      "水": ["/videos/shui-1.mp4", "/videos/shui-2.mp4", "/videos/shui-3.mp4"],
      "火": ["/videos/huo-1.mp4", "/videos/huo-2.mp4"]
    };

    const WORD_RECIPES = [
      { word: "火星", parts: ["火", "星"] },
      { word: "手指", parts: ["手", "指"] },
      { word: "东南西北", parts: ["东", "南", "西", "北"] },
      { word: "琴棋书画", parts: ["琴", "棋", "书", "画"] }
    ];

    const LOVE_RECIPES = [
      { word: "爱心", parts: ["爱", "心"] },
      { word: "你我", parts: ["你", "我"] },
      { word: "欢喜", parts: ["欢", "喜"] }
    ];

    const stage = document.getElementById("stage");
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const homePanel = document.getElementById("homePanel");
    const topbar = document.getElementById("topbar");
    const topTitle = document.getElementById("topTitle");
    const statusBox = document.getElementById("status");
    const statusLabel = document.getElementById("statusLabel");
    const statusText = document.getElementById("statusText");
    const countPill = document.getElementById("countPill");
    const toast = document.getElementById("toast");
    const player = document.getElementById("player");
    const videoOverlay = document.getElementById("videoOverlay");
    const videoTitle = document.getElementById("videoTitle");
    const videoClose = document.getElementById("videoClose");
    const videoNext = document.getElementById("videoNext");

    let width = 0;
    let height = 0;
    let dpr = 1;
    let mode = "home";
    let planets = [];
    let wordBodies = [];
    let loveBodies = [];
    let particles = [];
    let dragBody = null;
    let dragOffset = { x: 0, y: 0 };
    let pointerDown = null;
    let last = performance.now();
    let toastTimer = 0;
    let videoList = [];
    let videoIndex = 0;
    let brushProgress = 0;
    let brushRunning = false;
    let userTrail = [];

    const palette = [
      ["#fff1a8", "#ff9f1c", "#6c2500"],
      ["#c2f9ff", "#00c2ff", "#0a2d73"],
      ["#d7fff1", "#24e28a", "#06462b"],
      ["#ffd0f6", "#d546ff", "#3f0b76"],
      ["#ffe3c2", "#ff5e3a", "#57150f"],
      ["#edf7ff", "#8aa4ff", "#1b2366"],
      ["#fff4fb", "#ff5fa3", "#55102f"],
      ["#eaffb5", "#9cff38", "#1e4a08"],
      ["#f0ecff", "#7d4dff", "#1e1456"],
      ["#fff8d6", "#f7d13d", "#5c3d00"]
    ];

    const artStyles = {
      "水": "water",
      "雨": "ice",
      "火": "fire",
      "云": "cloud",
      "金": "gold",
      "木": "wood",
      "手": "rainbow",
      "指": "rainbow"
    };

    function resize() {
      const rect = stage.getBoundingClientRect();
      width = rect.width;
      height = rect.height;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function hanziPool() {
      const raw = Array.from(HANZI_SOURCE.match(/\p{Script=Han}/gu) || []);
      const unique = Array.from(new Set(raw));
      const preferred = ["云", "雨", "水", "火", "星", "手", "指", "东", "南", "西", "北", "琴", "棋", "书", "画"];
      const pool = [];
      preferred.forEach(char => {
        if (unique.includes(char) && !pool.includes(char)) pool.push(char);
      });
      unique.forEach(char => {
        if (!pool.includes(char)) pool.push(char);
      });
      let i = 0;
      while (pool.length < 998) {
        pool.push(unique[i % unique.length]);
        i++;
      }
      return pool.slice(0, 998);
    }

    function createPlanets() {
      const chars = hanziPool();
      const videoSlots = {
        "云": { x: 0.5, y: 0.3 },
        "雨": { x: 0.25, y: 0.62 },
        "水": { x: 0.74, y: 0.42 },
        "火": { x: 0.75, y: 0.58 }
      };
      planets = chars.map((char, i) => {
        const colors = palette[i % palette.length];
        const isVideo = Boolean(VIDEO_MAP[char]);
        const tier = i < 6 ? "big" : i < 26 ? "medium" : "small";
        const baseRadius = tier === "big" ? 34 + Math.random() * 18 : tier === "medium" ? 17 + Math.random() * 10 : 1.4 + Math.random() * 6;
        const z = tier === "big" ? 0.9 + Math.random() * 0.2 : tier === "medium" ? 0.56 + Math.random() * 0.32 : 0.12 + Math.random() * 0.58;
        const slot = videoSlots[char];
        return {
          char,
          tier,
          isVideo,
          x: slot ? width * slot.x : Math.random() * width,
          y: slot ? height * slot.y : Math.random() * height,
          z: isVideo ? 1.08 : z,
          r: isVideo ? Math.max(baseRadius, 44) : baseRadius,
          vx: slot ? (Math.random() - 0.5) * 8 : (Math.random() - 0.5) * (8 + 28 * z),
          vy: slot ? (Math.random() - 0.5) * 7 : (Math.random() - 0.5) * (8 + 24 * z),
          hue: colors,
          phase: Math.random() * Math.PI * 2,
          ring: i % 11 === 0 || isVideo,
          shine: Math.random()
        };
      });
    }

    function setMode(nextMode) {
      mode = nextMode;
      homePanel.classList.toggle("hidden", mode !== "home");
      topbar.classList.toggle("active", mode !== "home");
      statusBox.classList.toggle("active", mode !== "home");
      dragBody = null;
      brushRunning = false;
      brushProgress = 0;

      const titles = {
        universe: "汉字宇宙",
        word: "字碰碰",
        brush: "指彩笔",
        love: "爱碰碰"
      };
      topTitle.textContent = titles[mode] || "汉书998";

      if (mode === "universe") {
        statusLabel.textContent = "998汉字星球";
        statusText.textContent = "点击云、雨、水、火播放汉字视频";
        countPill.innerHTML = "998<br>字星";
      }
      if (mode === "word") initWordGame();
      if (mode === "love") initLoveGame();
      if (mode === "brush") {
        statusLabel.textContent = "指彩笔书法";
        statusText.textContent = "触碰屏幕，跟随彩色手指笔写“云”";
        countPill.innerHTML = "彩笔<br>引导";
        userTrail = [];
      }
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1700);
    }

    function drawSpace(time, intensity = 1) {
      const g = ctx.createLinearGradient(0, 0, width, height);
      g.addColorStop(0, "#03030f");
      g.addColorStop(0.42, intensity > 1.2 ? "#102413" : "#111141");
      g.addColorStop(1, "#010208");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, width, height);

      const nebula = ctx.createRadialGradient(width * 0.62, height * 0.34, 0, width * 0.55, height * 0.42, height * 0.62);
      nebula.addColorStop(0, `rgba(${intensity > 1.1 ? "40, 255, 160" : "160, 80, 255"}, 0.34)`);
      nebula.addColorStop(0.38, "rgba(70, 120, 255, 0.18)");
      nebula.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = nebula;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalAlpha = 0.62;
      for (let i = 0; i < 120; i++) {
        const x = (i * 73 + time * 0.006 * (i % 5 + 1)) % width;
        const y = (i * 127 + time * 0.012 * (i % 7 + 1)) % height;
        const s = i % 13 === 0 ? 1.8 : 0.8;
        ctx.fillStyle = i % 9 === 0 ? "#bfe8ff" : "#ffffff";
        ctx.fillRect(x, y, s, s);
      }
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = intensity > 1.1 ? "rgba(95,255,199,0.22)" : "rgba(95,205,255,0.18)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 6; i++) {
        const ox = width * (0.18 + i * 0.13);
        ctx.beginPath();
        ctx.ellipse(ox, height * 0.5, width * (0.18 + i * 0.03), height * 0.54, -0.12 + i * 0.04, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPlanet(p, time) {
      const bob = Math.sin(time * 0.0012 + p.phase) * 3 * p.z;
      const r = p.r * p.z;
      if (r < 0.7) return;

      const x = p.x;
      const y = p.y + bob;
      const [light, base, shade] = p.hue;
      const glow = ctx.createRadialGradient(x, y, 0, x, y, r * 3.2);
      glow.addColorStop(0, `${base}88`);
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(x, y, r * (p.isVideo ? 3.1 : 2.1), 0, Math.PI * 2);
      ctx.fill();

      if (p.ring && r > 8) {
        ctx.save();
        ctx.strokeStyle = `${light}88`;
        ctx.lineWidth = Math.max(1, r * 0.05);
        ctx.translate(x, y);
        ctx.rotate(-0.28);
        ctx.beginPath();
        ctx.ellipse(0, 0, r * 1.72, r * 0.42, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      const planet = ctx.createRadialGradient(x - r * 0.34, y - r * 0.42, r * 0.06, x, y, r);
      planet.addColorStop(0, "#ffffff");
      planet.addColorStop(0.13, light);
      planet.addColorStop(0.48, base);
      planet.addColorStop(1, shade);
      ctx.fillStyle = planet;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = Math.max(0.7, r * 0.03);
      ctx.beginPath();
      ctx.arc(x - r * 0.1, y + r * 0.1, r * 0.72, Math.PI * 0.12, Math.PI * 0.9);
      ctx.stroke();
      ctx.restore();

      if (r > 9 || p.isVideo) {
        drawArtChar(p.char, x, y + r * 0.05, Math.min(r * 1.1, p.isVideo ? 54 : 38), {
          alpha: p.isVideo ? 0.96 : 0.62,
          style: artStyles[p.char] || "glass",
          time,
          compact: !p.isVideo
        });
      }
    }

    function artGradient(style, x, y, size, time) {
      const wobble = Math.sin(time * 0.002) * size * 0.08;
      const grad = ctx.createLinearGradient(x - size * 0.6, y - size * 0.75 + wobble, x + size * 0.65, y + size * 0.72);
      if (style === "water") {
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(0.22, "#dffaff");
        grad.addColorStop(0.48, "#68d8ff");
        grad.addColorStop(0.72, "#e9fdff");
        grad.addColorStop(1, "#2f86ff");
      } else if (style === "fire") {
        grad.addColorStop(0, "#fff4af");
        grad.addColorStop(0.28, "#ffb020");
        grad.addColorStop(0.58, "#ff4b00");
        grad.addColorStop(1, "#5a0700");
      } else if (style === "cloud") {
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(0.34, "#f4fbff");
        grad.addColorStop(0.7, "#c9e6ff");
        grad.addColorStop(1, "#8fb3d9");
      } else if (style === "ice") {
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(0.32, "#dff7ff");
        grad.addColorStop(0.58, "#a7d8ff");
        grad.addColorStop(0.82, "#ffffff");
        grad.addColorStop(1, "#6097c9");
      } else if (style === "gold") {
        grad.addColorStop(0, "#fff8b7");
        grad.addColorStop(0.24, "#ffd447");
        grad.addColorStop(0.52, "#f5a400");
        grad.addColorStop(0.72, "#fff1a3");
        grad.addColorStop(1, "#8b4a00");
      } else if (style === "wood") {
        grad.addColorStop(0, "#f5e4b7");
        grad.addColorStop(0.28, "#8f5b2d");
        grad.addColorStop(0.58, "#4f2c16");
        grad.addColorStop(0.8, "#7bd96a");
        grad.addColorStop(1, "#1f6f3a");
      } else if (style === "rainbow") {
        grad.addColorStop(0, "#ff3d81");
        grad.addColorStop(0.22, "#ffe45e");
        grad.addColorStop(0.46, "#32ffa6");
        grad.addColorStop(0.72, "#46d7ff");
        grad.addColorStop(1, "#b14cff");
      } else {
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(0.32, "#eaf7ff");
        grad.addColorStop(0.62, "#a9d3ff");
        grad.addColorStop(1, "#7259ff");
      }
      return grad;
    }

    function drawArtChar(char, x, y, size, options = {}) {
      const style = options.style || artStyles[char] || "glass";
      const alpha = options.alpha ?? 1;
      const time = options.time || performance.now();
      ctx.save();
      ctx.globalAlpha *= alpha;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `900 ${size}px KaiTi, STKaiti, serif`;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      if (!options.compact) drawArtAtmosphere(style, char, x, y, size, time);

      ctx.save();
      ctx.shadowColor = style === "fire" ? "#ff7a00" : style === "gold" ? "#ffd447" : style === "wood" ? "#7bd96a" : "#dff8ff";
      ctx.shadowBlur = style === "fire" ? size * 0.45 : size * 0.32;
      ctx.lineWidth = Math.max(1.6, size * 0.08);
      ctx.strokeStyle = style === "fire" ? "rgba(255,118,0,0.72)" : "rgba(255,255,255,0.78)";
      ctx.strokeText(char, x, y);
      ctx.fillStyle = artGradient(style, x, y, size, time);
      ctx.fillText(char, x, y);
      ctx.restore();

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha *= 0.55;
      ctx.lineWidth = Math.max(1, size * 0.032);
      ctx.strokeStyle = style === "fire" ? "#fff2b8" : style === "gold" ? "#fff7c2" : "#ffffff";
      ctx.strokeText(char, x - size * 0.018, y - size * 0.025);
      ctx.restore();

      if (style === "fire") {
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        for (let i = 0; i < 3; i++) {
          ctx.globalAlpha = 0.24 - i * 0.05;
          ctx.fillStyle = i % 2 ? "#ff5a00" : "#ffd166";
          ctx.shadowColor = "#ff4b00";
          ctx.shadowBlur = size * (0.35 + i * 0.16);
          ctx.fillText(char, x + Math.sin(time * 0.006 + i) * size * 0.035, y - size * (0.04 + i * 0.035));
        }
        ctx.restore();
      }

      if (style === "water" || style === "ice") {
        ctx.save();
        ctx.globalAlpha *= 0.7;
        ctx.strokeStyle = "rgba(255,255,255,0.92)";
        ctx.lineWidth = Math.max(1, size * 0.018);
        ctx.strokeText(char, x + size * 0.035, y - size * 0.035);
        drawSparkles(x, y, size, time, style === "ice" ? "#e8fbff" : "#9deeff");
        ctx.restore();
      }

      if (style === "gold") drawSparkles(x, y, size, time, "#ffe27a");
      if (style === "wood") drawLeafFlecks(x, y, size, time);

      ctx.restore();
    }

    function drawArtAtmosphere(style, char, x, y, size, time) {
      if (style === "cloud") {
        ctx.save();
        ctx.globalAlpha = 0.32;
        ctx.fillStyle = "#ffffff";
        for (let i = 0; i < 9; i++) {
          const a = i * 0.9 + time * 0.001;
          const px = x + Math.cos(a) * size * (0.34 + (i % 3) * 0.08);
          const py = y + Math.sin(a * 1.3) * size * 0.28;
          ctx.beginPath();
          ctx.arc(px, py, size * (0.09 + (i % 4) * 0.025), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      if (style === "ice") {
        ctx.save();
        ctx.globalAlpha = 0.45;
        ctx.strokeStyle = "rgba(235,250,255,0.75)";
        ctx.lineWidth = 1;
        for (let i = 0; i < 10; i++) {
          const px = x - size * 0.72 + i * size * 0.16;
          ctx.beginPath();
          ctx.moveTo(px, y - size * 0.72);
          ctx.lineTo(px - size * 0.12, y + size * 0.72);
          ctx.stroke();
        }
        ctx.restore();
      }

      if (style === "fire") {
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        for (let i = 0; i < 7; i++) {
          const flame = ctx.createRadialGradient(x, y - size * 0.26, 0, x, y - size * 0.26, size * (0.52 + i * 0.03));
          flame.addColorStop(0, "rgba(255,214,84,0.12)");
          flame.addColorStop(1, "rgba(255,70,0,0)");
          ctx.fillStyle = flame;
          ctx.beginPath();
          ctx.ellipse(x + Math.sin(time * 0.004 + i) * size * 0.08, y - size * 0.15, size * 0.38, size * 0.58, Math.sin(i) * 0.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawSparkles(x, y, size, time, color) {
      ctx.save();
      ctx.fillStyle = color;
      ctx.strokeStyle = color;
      for (let i = 0; i < 7; i++) {
        const a = i * 2.13 + time * 0.002;
        const px = x + Math.cos(a) * size * (0.38 + (i % 3) * 0.08);
        const py = y + Math.sin(a * 1.7) * size * 0.48;
        const s = size * (0.025 + (i % 2) * 0.015);
        ctx.globalAlpha = 0.55 + Math.sin(time * 0.006 + i) * 0.25;
        ctx.beginPath();
        ctx.moveTo(px - s, py);
        ctx.lineTo(px + s, py);
        ctx.moveTo(px, py - s);
        ctx.lineTo(px, py + s);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawLeafFlecks(x, y, size, time) {
      ctx.save();
      ctx.fillStyle = "#80ed99";
      for (let i = 0; i < 6; i++) {
        const a = i * 1.4 + time * 0.001;
        const px = x + Math.cos(a) * size * 0.48;
        const py = y + Math.sin(a) * size * 0.42;
        ctx.beginPath();
        ctx.ellipse(px, py, size * 0.035, size * 0.07, a, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function updatePlanets(dt) {
      planets.forEach(p => {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        const margin = p.r * p.z + 10;
        if (p.x < -margin) p.x = width + margin;
        if (p.x > width + margin) p.x = -margin;
        if (p.y < -margin) p.y = height + margin;
        if (p.y > height + margin) p.y = -margin;
      });
    }

    function drawHome(time, dt) {
      drawSpace(time, 1);
      updatePlanets(dt * 0.55);
      planets
        .slice()
        .sort((a, b) => a.z - b.z)
        .forEach((p, i) => {
          if (i % 5 !== 0 || p.z > 0.72 || p.isVideo) drawPlanet(p, time);
        });

      ctx.save();
      const earth = ctx.createRadialGradient(width * 0.58, height * 0.55, 2, width * 0.5, height * 0.55, width * 0.48);
      earth.addColorStop(0, "rgba(255,255,255,0.94)");
      earth.addColorStop(0.16, "rgba(120,206,255,0.82)");
      earth.addColorStop(0.58, "rgba(61,96,204,0.42)");
      earth.addColorStop(1, "rgba(9,25,63,0)");
      ctx.fillStyle = earth;
      ctx.beginPath();
      ctx.arc(width * 0.5, height * 0.56, width * 0.38, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawUniverse(time, dt) {
      drawSpace(time, 1);
      updatePlanets(dt);
      planets.slice().sort((a, b) => a.z - b.z).forEach(p => drawPlanet(p, time));
    }

    function makeBody(label, x, y, color, group = "word") {
      return {
        label,
        parts: Array.from(label),
        x,
        y,
        r: label.length > 1 ? 33 + label.length * 5 : 27,
        vx: (Math.random() - 0.5) * 10,
        vy: (Math.random() - 0.5) * 10,
        color,
        group,
        done: false
      };
    }

    function initWordGame() {
      const labels = ["火", "星", "手", "指", "东", "南", "西", "北", "琴", "棋", "书", "画"];
      const colors = ["#ff5a35", "#ffd84d", "#4fd5ff", "#55f29c", "#c783ff", "#6fd8ff", "#ff7fb6", "#9eff61", "#ffd166", "#7bdff2", "#ff78de", "#a0c4ff"];
      wordBodies = labels.map((label, i) => makeBody(label, width * (0.18 + (i % 4) * 0.22), height * (0.28 + Math.floor(i / 4) * 0.18), colors[i], "word"));
      statusLabel.textContent = "字碰碰规则";
      statusText.textContent = "火+星、手+指、东南西北、琴棋书画";
      countPill.innerHTML = "2345<br>词库";
    }

    function initLoveGame() {
      const labels = ["爱", "心", "你", "我", "欢", "喜", "缘", "梦", "笑", "声"];
      loveBodies = labels.map((label, i) => makeBody(label, width * (0.18 + (i % 3) * 0.28), height * (0.25 + Math.floor(i / 3) * 0.16), i % 2 ? "#60a5fa" : "#ff6fae", "love"));
      statusLabel.textContent = "爱碰碰雏形";
      statusText.textContent = "拖动粉蓝星球相撞，爱心、你我、欢喜可合成";
      countPill.innerHTML = "缘分<br>星球";
    }

    function recipeState(parts, recipes) {
      const text = parts.join("");
      const exact = recipes.find(item => item.word === text);
      if (exact) return { kind: "complete", word: text };
      const prefix = recipes.find(item => item.word.startsWith(text));
      if (prefix) return { kind: "prefix", word: text };
      return null;
    }

    function tryMerge(a, b, list, recipes) {
      const variants = [
        { parts: [...a.parts, ...b.parts], base: a, remove: b },
        { parts: [...b.parts, ...a.parts], base: b, remove: a }
      ];
      for (const variant of variants) {
        const state = recipeState(variant.parts, recipes);
        if (!state) continue;
        variant.base.parts = variant.parts;
        variant.base.label = variant.parts.join("");
        variant.base.r = Math.min(68, 28 + variant.base.parts.length * 9);
        variant.base.vx = 0;
        variant.base.vy = 0;
        variant.base.done = state.kind === "complete";
        variant.base.color = state.kind === "complete" ? "#ffd166" : variant.base.color;
        const idx = list.indexOf(variant.remove);
        if (idx >= 0) list.splice(idx, 1);
        statusText.textContent = state.kind === "complete" ? `合成成功：${variant.base.label}` : `继续碰撞：${variant.base.label}`;
        showToast(state.kind === "complete" ? `生成新星球「${variant.base.label}」` : `组合前缀「${variant.base.label}」`);
        return true;
      }
      return false;
    }

    function updateBodies(list, recipes, dt) {
      list.forEach(b => {
        if (b !== dragBody) {
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          b.vx *= 0.995;
          b.vy *= 0.995;
        }
        if (b.x - b.r < 8 || b.x + b.r > width - 8) {
          b.vx *= -1;
          b.x = Math.max(8 + b.r, Math.min(width - 8 - b.r, b.x));
        }
        if (b.y - b.r < 76 || b.y + b.r > height - 96) {
          b.vy *= -1;
          b.y = Math.max(76 + b.r, Math.min(height - 96 - b.r, b.y));
        }
      });

      for (let i = 0; i < list.length; i++) {
        for (let j = i + 1; j < list.length; j++) {
          const a = list[i];
          const b = list[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy) || 1;
          if (dist >= a.r + b.r) continue;
          if (tryMerge(a, b, list, recipes)) return;
          const nx = dx / dist;
          const ny = dy / dist;
          const overlap = (a.r + b.r - dist) / 2;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
          [a.vx, b.vx] = [b.vx || -nx * 30, a.vx || nx * 30];
          [a.vy, b.vy] = [b.vy || -ny * 30, a.vy || ny * 30];
        }
      }
    }

    function drawBody(b) {
      const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 2.6);
      glow.addColorStop(0, `${b.color}99`);
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r * 2.2, 0, Math.PI * 2);
      ctx.fill();

      const g = ctx.createRadialGradient(b.x - b.r * 0.35, b.y - b.r * 0.35, 2, b.x, b.y, b.r);
      g.addColorStop(0, "#fff");
      g.addColorStop(0.24, b.color);
      g.addColorStop(1, "#101524");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `900 ${Math.max(18, Math.min(34, b.r * 0.82))}px KaiTi, STKaiti, serif`;
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = b.done ? 18 : 8;
      ctx.fillText(b.label, b.x, b.y + 1);
      ctx.shadowBlur = 0;
    }

    function drawWord(time, dt) {
      drawSpace(time, 1.25);
      drawTableLines();
      updateBodies(wordBodies, WORD_RECIPES, dt);
      wordBodies.forEach(drawBody);
    }

    function drawLove(time, dt) {
      drawSpace(time, 1);
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.strokeStyle = "#ff9fd3";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(width * 0.18, height * 0.78);
      ctx.lineTo(width * 0.82, height * 0.24);
      ctx.stroke();
      ctx.restore();
      updateBodies(loveBodies, LOVE_RECIPES, dt);
      loveBodies.forEach(drawBody);
    }

    function drawTableLines() {
      ctx.save();
      ctx.strokeStyle = "rgba(136,255,218,0.22)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 7; i++) {
        ctx.beginPath();
        ctx.ellipse(width * 0.5, height * 0.48, width * (0.18 + i * 0.045), height * 0.58, 0.18, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBrush(time) {
      drawBrushStudio(time);
      const cx = width * 0.5;
      const cy = height * 0.43;
      ctx.save();
      drawPracticeGlass();

      drawArtChar("云", cx, cy, width * 0.42, {
        alpha: 0.18,
        style: "cloud",
        time
      });

      const strokes = [
        [[cx - 72, cy - 72], [cx + 72, cy - 72]],
        [[cx - 48, cy - 18], [cx + 62, cy - 18]],
        [[cx - 42, cy + 32], [cx + 46, cy + 32]],
        [[cx + 12, cy - 14], [cx - 18, cy + 68], [cx + 52, cy + 54]]
      ];
      const total = brushProgress * strokes.length;
      const penPoint = pointOnStrokeSet(strokes, brushProgress);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      strokes.forEach((stroke, index) => {
        const local = Math.max(0, Math.min(1, total - index));
        if (local <= 0) return;
        ctx.save();
        ctx.shadowColor = index % 2 ? "#ff66cc" : "#7cf7ff";
        ctx.shadowBlur = 18;
        ctx.strokeStyle = strokeGradient(index, stroke);
        ctx.lineWidth = 10;
        drawPartialPath(stroke, local);
        ctx.restore();
      });

      drawUserTrail();
      drawFingerBrush(penPoint.x, penPoint.y, time);
      ctx.restore();

      if (brushRunning) {
        brushProgress += 0.0065;
        if (brushProgress >= 1) {
          brushProgress = 1;
          brushRunning = false;
          statusText.textContent = "完成“云”字描红，下一步接入998套笔顺数据";
        }
      }
    }

    function drawBrushStudio(time) {
      const g = ctx.createLinearGradient(0, 0, width, height);
      g.addColorStop(0, "#071021");
      g.addColorStop(0.5, "#101530");
      g.addColorStop(1, "#04060f");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, width, height);

      const floor = ctx.createLinearGradient(0, height * 0.58, 0, height);
      floor.addColorStop(0, "rgba(16, 220, 255, 0.02)");
      floor.addColorStop(1, "rgba(80, 40, 160, 0.42)");
      ctx.fillStyle = floor;
      ctx.fillRect(0, height * 0.58, width, height * 0.42);

      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.strokeStyle = "rgba(74, 229, 255, 0.42)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        const y = height * (0.62 + i * 0.045);
        ctx.beginPath();
        ctx.moveTo(width * 0.06, y);
        ctx.lineTo(width * 0.94, y + i * 8);
        ctx.stroke();
      }
      for (let i = 0; i < 8; i++) {
        const x = width * (0.08 + i * 0.12);
        ctx.beginPath();
        ctx.moveTo(x, height * 0.6);
        ctx.lineTo(width * 0.5 + (x - width * 0.5) * 1.8, height);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const aura = ctx.createRadialGradient(width * 0.62, height * 0.34, 0, width * 0.55, height * 0.38, height * 0.42);
      aura.addColorStop(0, "rgba(255, 70, 210, 0.26)");
      aura.addColorStop(0.42, "rgba(38, 225, 255, 0.16)");
      aura.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = aura;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();

      ctx.save();
      ctx.font = "900 18px KaiTi, STKaiti, serif";
      ctx.globalAlpha = 0.45;
      const floating = ["指", "彩", "笔", "书", "云", "火", "水"];
      floating.forEach((char, i) => {
        const x = (width * 0.14 + i * width * 0.13 + Math.sin(time * 0.001 + i) * 12) % width;
        const y = height * (0.72 + (i % 3) * 0.055) + Math.cos(time * 0.0015 + i) * 10;
        drawArtChar(char, x, y, 18 + (i % 3) * 3, {
          alpha: 0.72,
          style: i % 2 ? "rainbow" : "glass",
          time,
          compact: true
        });
      });
      ctx.restore();
    }

    function drawPracticeGlass() {
      ctx.fillStyle = "rgba(255,255,255,0.065)";
      ctx.strokeStyle = "rgba(135,235,255,0.22)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(width * 0.12, height * 0.2, width * 0.76, height * 0.45, 10);
      ctx.fill();
      ctx.stroke();

      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = "#ffffff";
      ctx.setLineDash([4, 9]);
      ctx.beginPath();
      ctx.moveTo(width * 0.5, height * 0.22);
      ctx.lineTo(width * 0.5, height * 0.63);
      ctx.moveTo(width * 0.14, height * 0.425);
      ctx.lineTo(width * 0.86, height * 0.425);
      ctx.stroke();
      ctx.restore();
    }

    function strokeGradient(index, stroke) {
      const start = stroke[0];
      const end = stroke[stroke.length - 1];
      const grad = ctx.createLinearGradient(start[0], start[1], end[0], end[1]);
      if (index % 3 === 0) {
        grad.addColorStop(0, "#36f7ff");
        grad.addColorStop(0.55, "#ffffff");
        grad.addColorStop(1, "#b85cff");
      } else if (index % 3 === 1) {
        grad.addColorStop(0, "#ff4fd8");
        grad.addColorStop(0.5, "#ffe45e");
        grad.addColorStop(1, "#36f7ff");
      } else {
        grad.addColorStop(0, "#8cff6b");
        grad.addColorStop(0.5, "#36f7ff");
        grad.addColorStop(1, "#ff4fd8");
      }
      return grad;
    }

    function pointOnStrokeSet(strokes, progress) {
      if (progress >= 1) {
        const lastStroke = strokes[strokes.length - 1];
        const lastPoint = lastStroke[lastStroke.length - 1];
        return { x: lastPoint[0], y: lastPoint[1] };
      }
      const total = progress * strokes.length;
      const strokeIndex = Math.max(0, Math.min(strokes.length - 1, Math.floor(total)));
      const local = total - strokeIndex;
      const stroke = strokes[strokeIndex];
      if (stroke.length === 2) {
        return {
          x: stroke[0][0] + (stroke[1][0] - stroke[0][0]) * local,
          y: stroke[0][1] + (stroke[1][1] - stroke[0][1]) * local
        };
      }
      const firstHalf = local < 0.5;
      const a = firstHalf ? stroke[0] : stroke[1];
      const b = firstHalf ? stroke[1] : stroke[2];
      const t = firstHalf ? local * 2 : (local - 0.5) * 2;
      return { x: a[0] + (b[0] - a[0]) * t, y: a[1] + (b[1] - a[1]) * t };
    }

    function drawUserTrail() {
      if (userTrail.length < 2) return;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.strokeStyle = "rgba(255,255,255,0.7)";
      ctx.shadowColor = "#7cf7ff";
      ctx.shadowBlur = 14;
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(userTrail[0].x, userTrail[0].y);
      for (let i = 1; i < userTrail.length; i++) ctx.lineTo(userTrail[i].x, userTrail[i].y);
      ctx.stroke();
      ctx.restore();
    }

    function drawPartialPath(points, amount) {
      if (points.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1];
        const next = points[i];
        if (amount >= i / (points.length - 1)) {
          ctx.lineTo(next[0], next[1]);
        } else {
          const segStart = (i - 1) / (points.length - 1);
          const segEnd = i / (points.length - 1);
          const t = (amount - segStart) / (segEnd - segStart);
          if (t > 0) ctx.lineTo(prev[0] + (next[0] - prev[0]) * t, prev[1] + (next[1] - prev[1]) * t);
          break;
        }
      }
      ctx.stroke();
    }

    function drawFingerBrush(x, y, time) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-0.64 + Math.sin(time * 0.003) * 0.06);

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const tipGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 64);
      tipGlow.addColorStop(0, "rgba(255, 77, 216, 0.85)");
      tipGlow.addColorStop(0.42, "rgba(78, 224, 255, 0.26)");
      tipGlow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = tipGlow;
      ctx.beginPath();
      ctx.arc(0, 0, 64, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      const bristle = ctx.createLinearGradient(-10, 42, 12, -14);
      bristle.addColorStop(0, "#9c2bff");
      bristle.addColorStop(0.34, "#e747ff");
      bristle.addColorStop(0.72, "#5af0ff");
      bristle.addColorStop(1, "#fff");
      ctx.fillStyle = bristle;
      ctx.beginPath();
      ctx.moveTo(-13, 28);
      ctx.quadraticCurveTo(-10, 5, -5, -10);
      ctx.quadraticCurveTo(4, -22, 14, -8);
      ctx.quadraticCurveTo(10, 12, 5, 35);
      ctx.quadraticCurveTo(-3, 46, -13, 28);
      ctx.fill();

      const finger = ctx.createLinearGradient(-28, -20, 54, -114);
      finger.addColorStop(0, "#ffe45e");
      finger.addColorStop(0.18, "#37f5a8");
      finger.addColorStop(0.4, "#30c8ff");
      finger.addColorStop(0.66, "#9e50ff");
      finger.addColorStop(1, "#ff3131");
      ctx.fillStyle = finger;
      ctx.shadowColor = "#59e6ff";
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.moveTo(-21, -8);
      ctx.bezierCurveTo(-28, -40, -10, -92, 14, -124);
      ctx.bezierCurveTo(36, -111, 46, -82, 36, -45);
      ctx.bezierCurveTo(31, -23, 21, -4, 9, 8);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = "rgba(255,255,255,0.55)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-4, -95);
      ctx.bezierCurveTo(14, -78, 18, -45, 10, -12);
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.86)";
      ctx.beginPath();
      ctx.ellipse(5, -19, 12, 7, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function openVideo(char) {
      videoList = VIDEO_MAP[char] || [];
      if (!videoList.length) {
        statusText.textContent = `${char}：视频制作中`;
        showToast(`「${char}」字视频制作中`);
        return;
      }
      videoIndex = 0;
      videoTitle.textContent = `「${char}」字视频 1 / ${videoList.length}`;
      player.src = videoList[videoIndex];
      videoOverlay.classList.add("active");
      player.play().catch(() => {});
    }

    function nextVideo() {
      if (!videoList.length) return;
      videoIndex += 1;
      if (videoIndex >= videoList.length) {
        closeVideo();
        return;
      }
      const titleChar = Object.keys(VIDEO_MAP).find(key => VIDEO_MAP[key] === videoList) || "汉";
      videoTitle.textContent = `「${titleChar}」字视频 ${videoIndex + 1} / ${videoList.length}`;
      player.src = videoList[videoIndex];
      player.play().catch(() => {});
    }

    function closeVideo() {
      player.pause();
      player.removeAttribute("src");
      player.load();
      videoOverlay.classList.remove("active");
    }

    function pointerPos(event) {
      const rect = canvas.getBoundingClientRect();
      const point = event.touches ? event.touches[0] : event;
      return { x: point.clientX - rect.left, y: point.clientY - rect.top };
    }

    function hitPlanet(pos) {
      const candidates = planets
        .filter(p => Math.hypot(pos.x - p.x, pos.y - p.y) < Math.max(22, p.r * p.z * (p.isVideo ? 1.35 : 1)))
        .sort((a, b) => b.z - a.z);
      return candidates[0];
    }

    function hitBody(pos, list) {
      return list
        .slice()
        .reverse()
        .find(b => Math.hypot(pos.x - b.x, pos.y - b.y) <= b.r);
    }

    function onDown(event) {
      const pos = pointerPos(event);
      pointerDown = pos;
      if (mode === "word") dragBody = hitBody(pos, wordBodies);
      if (mode === "love") dragBody = hitBody(pos, loveBodies);
      if (mode === "brush") {
        brushRunning = true;
        if (brushProgress >= 1) brushProgress = 0;
        userTrail = [pos];
        statusText.textContent = "彩笔正在书写“云”，请跟随笔锋移动";
        showToast("指彩笔开始书写");
      }
      if (dragBody) {
        dragOffset.x = pos.x - dragBody.x;
        dragOffset.y = pos.y - dragBody.y;
        dragBody.vx = 0;
        dragBody.vy = 0;
        event.preventDefault();
      }
    }

    function onMove(event) {
      if (mode === "brush") {
        const pos = pointerPos(event);
        userTrail.push(pos);
        if (userTrail.length > 180) userTrail.shift();
        event.preventDefault();
      }
      if (!dragBody) return;
      const pos = pointerPos(event);
      dragBody.x = pos.x - dragOffset.x;
      dragBody.y = pos.y - dragOffset.y;
      event.preventDefault();
    }

    function onUp(event) {
      const pos = event.changedTouches ? pointerPos({ touches: event.changedTouches }) : pointerPos(event);
      if (dragBody) {
        dragBody.vx = (Math.random() - 0.5) * 48;
        dragBody.vy = (Math.random() - 0.5) * 48;
      } else if (mode === "universe" && pointerDown && Math.hypot(pos.x - pointerDown.x, pos.y - pointerDown.y) < 12) {
        const planet = hitPlanet(pos);
        if (planet) {
          statusText.textContent = VIDEO_MAP[planet.char] ? `${planet.char}：打开汉字视频` : `${planet.char}：视频制作中`;
          openVideo(planet.char);
        }
      }
      dragBody = null;
      pointerDown = null;
    }

    function loop(time) {
      const dt = Math.min(0.034, (time - last) / 1000);
      last = time;
      if (mode === "home") drawHome(time, dt);
      if (mode === "universe") drawUniverse(time, dt);
      if (mode === "word") drawWord(time, dt);
      if (mode === "brush") drawBrush(time);
      if (mode === "love") drawLove(time, dt);
      requestAnimationFrame(loop);
    }

    document.querySelectorAll("[data-mode]").forEach(button => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });
    document.getElementById("backBtn").addEventListener("click", () => setMode("home"));
    document.getElementById("shuffleBtn").addEventListener("click", () => {
      if (mode === "universe" || mode === "home") createPlanets();
      if (mode === "word") initWordGame();
      if (mode === "love") initLoveGame();
      if (mode === "brush") {
        brushProgress = 0;
        brushRunning = true;
      }
    });
    videoClose.addEventListener("click", closeVideo);
    videoNext.addEventListener("click", nextVideo);
    player.addEventListener("ended", nextVideo);

    canvas.addEventListener("mousedown", onDown);
    canvas.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    canvas.addEventListener("touchstart", onDown, { passive: false });
    canvas.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onUp);
    window.addEventListener("resize", () => {
      resize();
      createPlanets();
      if (mode === "word") initWordGame();
      if (mode === "love") initLoveGame();
    });

    resize();
    createPlanets();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
