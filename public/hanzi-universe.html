<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>汉字宇宙 - 竖屏手游首页</title>
  <style>
    :root {
      --frame-w: min(100vw, 450px);
      --frame-h: min(100vh, calc(var(--frame-w) * 16 / 9));
      --deep: #060012;
      --panel: rgba(8, 7, 23, 0.72);
      --text: rgba(255, 255, 255, 0.92);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 14%, rgba(116, 72, 255, 0.34), transparent 34%),
        radial-gradient(circle at 15% 74%, rgba(0, 210, 255, 0.16), transparent 28%),
        #020008;
      color: var(--text);
      font-family: "KaiTi", "STKaiti", "Microsoft YaHei", serif;
      touch-action: none;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    .phone-stage {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      max-height: 100vh;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 52% 30%, rgba(114, 79, 255, 0.32) 0%, rgba(29, 17, 75, 0.52) 30%, transparent 62%),
        radial-gradient(circle at 78% 72%, rgba(0, 221, 255, 0.14), transparent 26%),
        linear-gradient(180deg, #130821 0%, #080017 48%, #020008 100%);
      box-shadow: 0 0 60px rgba(117, 92, 255, 0.22);
    }

    .nebula,
    .stars,
    .dust {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .nebula {
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.1), transparent 8%),
        radial-gradient(circle at 56% 42%, rgba(255, 95, 194, 0.22), transparent 18%),
        radial-gradient(circle at 42% 48%, rgba(80, 220, 255, 0.18), transparent 22%);
      filter: blur(18px);
      opacity: 0.78;
      animation: breathe 8s ease-in-out infinite alternate;
    }

    .stars {
      background-image:
        radial-gradient(1px 1px at 12% 16%, #fff, transparent),
        radial-gradient(1px 1px at 28% 65%, #fff, transparent),
        radial-gradient(2px 2px at 54% 14%, #fff, transparent),
        radial-gradient(1px 1px at 76% 31%, #fff, transparent),
        radial-gradient(2px 2px at 91% 72%, #fff, transparent),
        radial-gradient(1px 1px at 39% 88%, #fff, transparent),
        radial-gradient(1px 1px at 64% 80%, #fff, transparent);
      background-size: 220px 360px;
      animation: driftStars 18s linear infinite;
      opacity: 0.84;
    }

    .dust {
      background-image:
        radial-gradient(circle at center, rgba(255,255,255,0.55) 0 1px, transparent 1.5px);
      background-size: 54px 54px;
      mask-image: radial-gradient(ellipse at 50% 50%, #000 0%, transparent 74%);
      opacity: 0.28;
      animation: dustSpin 24s linear infinite;
    }

    .hud {
      position: absolute;
      top: clamp(18px, 5.6vh, 42px);
      left: 22px;
      right: 22px;
      z-index: 10;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      pointer-events: none;
    }

    .title-group {
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.5);
    }

    .eyebrow {
      margin-bottom: 8px;
      font: 600 12px/1 "Microsoft YaHei", sans-serif;
      letter-spacing: 0.18em;
      color: rgba(139, 226, 255, 0.82);
    }

    h1 {
      font-size: clamp(34px, 10vw, 48px);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 900;
    }

    .counter {
      min-width: 74px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.26);
      text-align: center;
      font-family: "Microsoft YaHei", sans-serif;
    }

    .counter strong {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .counter span {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.68);
    }

    .orbit-field {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .planet {
      --size: 52px;
      --glow: #67e8f9;
      position: absolute;
      left: 0;
      top: 0;
      width: var(--size);
      height: var(--size);
      border: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 31% 26%, rgba(255, 255, 255, 0.88) 0 8%, transparent 26%),
        radial-gradient(circle at 32% 30%, var(--light), var(--base) 45%, var(--shade) 100%);
      box-shadow:
        inset calc(var(--size) * -0.12) calc(var(--size) * -0.14) calc(var(--size) * 0.22) rgba(0, 0, 0, 0.48),
        0 0 calc(var(--size) * 0.5) color-mix(in srgb, var(--glow) 80%, transparent),
        0 0 calc(var(--size) * 1.15) color-mix(in srgb, var(--glow) 28%, transparent);
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: calc(var(--size) * 0.58);
      line-height: 1;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
      transform: translate3d(var(--x), var(--y), 0);
      transition: filter 0.2s ease, box-shadow 0.2s ease;
      will-change: transform;
    }

    .planet::before {
      content: "";
      position: absolute;
      inset: -38%;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--glow) 34%, transparent) 0%, transparent 66%);
      opacity: 0.72;
      z-index: -1;
    }

    .planet::after {
      content: "";
      position: absolute;
      inset: 15%;
      border-radius: 50%;
      border-top: 1px solid rgba(255, 255, 255, 0.18);
      transform: rotate(-22deg);
      opacity: 0.5;
    }

    .planet.ring .ring {
      position: absolute;
      width: 170%;
      height: 48%;
      border: 1.5px solid color-mix(in srgb, var(--glow) 62%, white 20%);
      border-left-color: transparent;
      border-right-color: transparent;
      border-radius: 50%;
      transform: rotate(-18deg);
      opacity: 0.56;
      pointer-events: none;
    }

    .planet .char {
      position: relative;
      z-index: 2;
      opacity: 0.58;
      mix-blend-mode: screen;
      transform: translateY(1px);
    }

    .planet:active {
      filter: brightness(1.18);
      box-shadow:
        inset calc(var(--size) * -0.1) calc(var(--size) * -0.12) calc(var(--size) * 0.2) rgba(0, 0, 0, 0.4),
        0 0 calc(var(--size) * 0.8) var(--glow),
        0 0 calc(var(--size) * 1.6) color-mix(in srgb, var(--glow) 42%, transparent);
    }

    .dock {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 12;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      pointer-events: none;
    }

    .info-panel {
      min-height: 62px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(8, 7, 23, 0.76);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      font-family: "Microsoft YaHei", sans-serif;
    }

    .info-panel .label {
      font-size: 11px;
      color: rgba(139, 226, 255, 0.76);
    }

    .info-panel .value {
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 17px;
      font-weight: 700;
    }

    .play-chip {
      width: 62px;
      height: 62px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 26%, rgba(255,255,255,0.9), transparent 18%),
        linear-gradient(135deg, #ff5faf, #00d2ff);
      box-shadow: 0 0 34px rgba(0, 210, 255, 0.36);
      display: grid;
      place-items: center;
      font: 900 24px/1 "Microsoft YaHei", sans-serif;
      color: #fff;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 102px;
      z-index: 14;
      max-width: calc(100% - 44px);
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      color: #101321;
      font: 600 14px/1.45 "Microsoft YaHei", sans-serif;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @keyframes breathe {
      from { transform: scale(1); opacity: 0.68; }
      to { transform: scale(1.08); opacity: 0.9; }
    }

    @keyframes driftStars {
      from { background-position: 0 0; }
      to { background-position: 0 -360px; }
    }

    @keyframes dustSpin {
      from { transform: rotate(0deg) scale(1.2); }
      to { transform: rotate(360deg) scale(1.2); }
    }

    @media (min-aspect-ratio: 9 / 16) {
      :root {
        --frame-h: 100vh;
        --frame-w: min(450px, calc(100vh * 9 / 16));
      }
    }
  </style>
</head>
<body>
  <main class="phone-stage" aria-label="汉字宇宙首页">
    <div class="nebula"></div>
    <div class="stars"></div>
    <div class="dust"></div>

    <header class="hud">
      <div class="title-group">
        <p class="eyebrow">HANZI COSMOS</p>
        <h1>汉字宇宙</h1>
      </div>
      <div class="counter" aria-label="汉字星球数量">
        <strong id="planet-count">0</strong>
        <span>字星</span>
      </div>
    </header>

    <section class="orbit-field" id="orbit-field" aria-label="运行中的汉字星球"></section>

    <section class="dock" aria-live="polite">
      <div class="info-panel">
        <div class="label">当前汉字视频入口</div>
        <div class="value" id="active-word">点击任意星球</div>
      </div>
      <div class="play-chip" aria-hidden="true">▶</div>
    </section>

    <div class="toast" id="toast">已选择汉字星球</div>
  </main>

  <script>
    const chars = "人身心声相仁义礼智信头发眼脸哭笑欢衣食住你我他她爸妈兄弟姐妹".split("");
    const palette = [
      ["#ffd166", "#ef476f", "#70163c"],
      ["#7bdff2", "#4d96ff", "#16213e"],
      ["#b8f2e6", "#06d6a0", "#064e3b"],
      ["#f7aef8", "#9b5de5", "#2d124f"],
      ["#fbc4ab", "#f9844a", "#5a1f12"],
      ["#caffbf", "#80ed99", "#1b4332"],
      ["#fdffb6", "#ffbe0b", "#5f3d00"],
      ["#ffc6ff", "#ff4d6d", "#590d22"],
      ["#a0c4ff", "#4361ee", "#111a63"],
      ["#d0f4de", "#00bbf9", "#063b52"],
      ["#e0aaff", "#7209b7", "#240046"],
      ["#ffccd5", "#ff758f", "#6d213c"]
    ];

    const field = document.getElementById("orbit-field");
    const activeWord = document.getElementById("active-word");
    const toast = document.getElementById("toast");
    const count = document.getElementById("planet-count");
    const planets = [];
    let toastTimer = 0;
    let lastTime = performance.now();

    function stageSize() {
      const rect = field.getBoundingClientRect();
      return { width: rect.width, height: rect.height };
    }

    function makePlanet(char, index) {
      const colors = palette[index % palette.length];
      const size = Math.round(26 + Math.random() * 58 + (index % 7 === 0 ? 18 : 0));
      const { width, height } = stageSize();
      const safeTop = Math.max(96, height * 0.13);
      const safeBottom = Math.max(112, height * 0.16);
      const planet = document.createElement("button");
      const hasRing = index % 5 === 1 || index % 9 === 0;
      planet.className = `planet${hasRing ? " ring" : ""}`;
      planet.type = "button";
      planet.setAttribute("aria-label", `${char}字星球，点击播放对应汉字视频`);
      planet.style.setProperty("--size", `${size}px`);
      planet.style.setProperty("--light", colors[0]);
      planet.style.setProperty("--base", colors[1]);
      planet.style.setProperty("--shade", colors[2]);
      planet.style.setProperty("--glow", colors[(index + 1) % colors.length]);
      planet.innerHTML = `<span class="char">${char}</span>${hasRing ? '<span class="ring"></span>' : ""}`;
      field.appendChild(planet);

      const body = {
        el: planet,
        char,
        size,
        x: Math.random() * Math.max(1, width - size),
        y: safeTop + Math.random() * Math.max(1, height - safeTop - safeBottom - size),
        vx: (Math.random() > 0.5 ? 1 : -1) * (7 + Math.random() * 14),
        vy: (Math.random() > 0.5 ? 1 : -1) * (5 + Math.random() * 12),
        phase: Math.random() * Math.PI * 2,
        pulse: 0.96 + Math.random() * 0.1
      };

      planet.addEventListener("click", () => choosePlanet(body));
      planets.push(body);
      updatePlanet(body, 0);
    }

    function choosePlanet(body) {
      activeWord.textContent = `${body.char}：点击后可接入“${body.char}”字视频`;
      toast.textContent = `已选择「${body.char}」字星球，可绑定视频源`;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function updatePlanet(body, time) {
      const bob = Math.sin(time * 0.0014 + body.phase) * 4;
      body.el.style.setProperty("--x", `${body.x}px`);
      body.el.style.setProperty("--y", `${body.y + bob}px`);
      body.el.style.transform = `translate3d(var(--x), var(--y), 0) scale(${body.pulse})`;
    }

    function tick(time) {
      const { width, height } = stageSize();
      const dt = Math.min(0.032, (time - lastTime) / 1000);
      lastTime = time;
      const safeTop = Math.max(96, height * 0.13);
      const safeBottom = Math.max(112, height * 0.16);

      planets.forEach(body => {
        body.x += body.vx * dt;
        body.y += body.vy * dt;

        if (body.x <= 0 || body.x + body.size >= width) {
          body.vx *= -1;
          body.x = Math.max(0, Math.min(width - body.size, body.x));
        }

        if (body.y <= safeTop || body.y + body.size >= height - safeBottom) {
          body.vy *= -1;
          body.y = Math.max(safeTop, Math.min(height - safeBottom - body.size, body.y));
        }

        updatePlanet(body, time);
      });

      requestAnimationFrame(tick);
    }

    function boot() {
      chars.forEach(makePlanet);
      count.textContent = String(chars.length);
      requestAnimationFrame(tick);
    }

    window.addEventListener("resize", () => {
      const { width, height } = stageSize();
      planets.forEach(body => {
        body.x = Math.max(0, Math.min(width - body.size, body.x));
        body.y = Math.max(96, Math.min(height - 120 - body.size, body.y));
      });
    });

    boot();
  </script>
</body>
</html>
